<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Descubra o melhor de Brasília com o Alfa Plaza Hotel. Conforto, localização estratégica e atendimento de excelência para sua estadia." />
    <title>Alfa Plaza Hotel | Conforto e Sofisticação em Brasília</title>

    <!-- Preload Critical Assets -->
    <link rel="preload" fetchpriority="high" as="image" href="/logo1.png" type="image/png">
    <link rel="preload" fetchpriority="high" as="image" href="/backgroundalfa.webp" type="image/webp">
    <link rel="preload" fetchpriority="high" as="video" href="/background video.mp4" type="video/mp4">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo1.png" />
    <link rel="apple-touch-icon" href="/logo1.png" />

    <!-- Open Graph / WhatsApp / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://site-alfa-plaza.vercel.app/" />
    <meta property="og:title" content="Alfa Plaza Hotel | Brasília" />
    <meta property="og:description" content="Conforto, sofisticação e localização estratégica no Distrito Federal. Sua melhor estadia começa aqui." />
    <meta property="og:image" content="https://site-alfa-plaza.vercel.app/logo1.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://site-alfa-plaza.vercel.app/" />
    <meta property="twitter:title" content="Alfa Plaza Hotel | Brasília" />
    <meta property="twitter:description" content="Conforto, sofisticação e localização estratégica no Distrito Federal. Sua melhor estadia começa aqui." />

  </head>
